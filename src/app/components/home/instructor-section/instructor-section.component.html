<div class="mt-16">
    <div class="flex flex-row  gap-20 items-center">
        <div class="w-[50%]">
            <img src="/assets/Images/Instructor.png" class="shadow-white">
        </div>
        <div class="w-[50%] flex flex-col gap-7">
            <div class="text-4xl font-semibold w-[50%]">
                Become an <app-highlighttext [text]="'Instructor'"></app-highlighttext>
            </div>
            <p class="text-[16px] w-[80%] text-richblack-300 font-medium">
                Instructors from around the world teach millions of students on StudyNotion. We provide the tools and
                skills to teach what you love.
            </p>
            <div
                class="flex text-[17px] px-6 py-3 rounded-md font-bold bg-yellow-50 text-black hover:scale-95 transition-all duration-200 gap-1 items-center w-fit">
                <button class="text-center ">
                    Start Learning Today</button>
                <mat-icon>arrow_forward</mat-icon>
            </div>
        </div>
    </div>
</div>
