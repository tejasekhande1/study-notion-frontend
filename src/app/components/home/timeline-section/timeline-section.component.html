<div class="flex flex-col md:flex-row gap-5 items-center">
    <div class="w-full md:w-[45%] flex flex-col gap-5">
        <ng-container *ngFor="let timeline of timeLines">
            <div class="flex flex-row gap-6 relative">
                <div class="w-[50px] h-[50px] bg-white flex items-center rounded-full p-4">
                    <img src="{{timeline.Logo}}" />
                </div>
                <div>
                    <h2 class="font-semibold text-[18px]"> {{timeline.heading}}</h2>
                    <p class="text-base"> {{timeline.description}}</p>
                </div>
            </div>
        </ng-container>
    </div>
    <div class="w-full md:w-[55%] relative shadow-blue-200">
        <img src="../../../../assets/Images/TimelineImage.png" class="shadow-white object-cover w-full h-auto">
        <div class="absolute inset-0 flex flex-col justify-center items-center left-[50%] translate-x-[-50%] translate-y-[50%]">
            <div class="bg-caribbeangreen-700 flex flex-row text-white uppercase py-5">
                <div class="flex flex-row gap-5 items-center border-r border-caribbeangreen-300 px-7">
                    <p class="text-3xl font-bold">10</p>
                    <p class="text-caribbeangreen-300 text-sm">Years of Experience</p>
                </div>
                <div class="flex flex-row gap-5 items-center px-7">
                    <p class="text-3xl font-bold">250</p>
                    <p class="text-caribbeangreen-300 text-sm">Type Of Courses</p>
                </div>
            </div>
        </div>
    </div>
</div>
